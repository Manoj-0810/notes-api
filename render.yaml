services:
  - type: web
    name: notes-api
    env: python
    runtime: python3
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: notes-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_ORIGINS
        value: "*"
    healthCheckPath: /about
    plan: free

databases:
  - name: notes-db
    databaseName: notesapp
    user: notesapp
    plan: free
